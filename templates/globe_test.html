<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Globe Test — Pin Accuracy</title>
<style>
* { margin:0; padding:0; }
body { background:#000; overflow:hidden; font-family:'Segoe UI',sans-serif; }
#controls {
    position:absolute; top:10px; left:10px; z-index:10;
    background:rgba(0,0,0,0.8); padding:12px 16px; border-radius:8px;
    color:#fff; font-size:13px;
}
#controls input { width:80px; padding:2px 6px; margin:0 4px; background:#222; color:#fff; border:1px solid #555; border-radius:4px; }
#controls button { padding:4px 14px; margin-left:8px; background:#ff3344; color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
#controls button:hover { background:#ff5566; }
#info { position:absolute; bottom:10px; left:10px; color:#0f0; font:12px monospace; z-index:10; }
</style>
</head><body>
<canvas id="c"></canvas>

<div id="controls">
    Lat: <input id="lat" type="number" step="0.001" value="35.6938">
    Lng: <input id="lng" type="number" step="0.001" value="139.7034">
    <button onclick="go()">FLY & PIN</button>
    <br><br>
    <small style="color:#888">
        Tokyo: 35.6938, 139.7034 &nbsp;|&nbsp; Cairo: 30.0444, 31.2357 &nbsp;|&nbsp; Aomori: 40.8244, 140.74<br>
        Bangkok: 13.7563, 100.5018 &nbsp;|&nbsp; Russia: 59.9343, 30.3351 &nbsp;|&nbsp; Phuket: 7.8804, 98.292
    </small>
</div>
<div id="info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18/dist/tween.umd.js"></script>
<script>
// ═══════════════════════════════════════════
//  SCENE SETUP
// ═══════════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
camera.position.set(0, 0, 3.5);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setClearColor(0x000000);
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

// Stars
const sv = [];
for (let i = 0; i < 2000; i++) sv.push((Math.random()-0.5)*80,(Math.random()-0.5)*80,(Math.random()-0.5)*80);
scene.add(new THREE.Points(
    new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(sv, 3)),
    new THREE.PointsMaterial({ color: 0xffffff, size: 0.06 })
));

// Earth
const earth = new THREE.Mesh(
    new THREE.SphereGeometry(1, 64, 64),
    new THREE.MeshBasicMaterial({ map: new THREE.TextureLoader().load('/static/earth_night.jpg') })
);
scene.add(earth);

// Atmosphere
scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(1.02, 64, 64),
    new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.08, side: THREE.BackSide })
));

// Pin group — CHILD OF EARTH (rotates with earth)
const pinGroup = new THREE.Group();
earth.add(pinGroup);

scene.add(new THREE.AmbientLight(0xffffff, 0.3));

window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════
//  CORE MATH
// ═══════════════════════════════════════════

// Lat/Lng → 3D position on Three.js SphereGeometry (equirectangular UV)
function latLngToVec3(lat, lng, r) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = (lng + 180) * Math.PI / 180;
    return new THREE.Vector3(
        -(r * Math.sin(phi) * Math.cos(theta)),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta)
    );
}

// Camera spherical position (polar=0 at north pole, azimuth=horizontal orbit)
function setCam(dist, polar, azimuth) {
    camera.position.set(
        dist * Math.sin(polar) * Math.sin(azimuth),
        dist * Math.cos(polar),
        dist * Math.sin(polar) * Math.cos(azimuth)
    );
    camera.lookAt(0, 0, 0);
}

// Compute camera angles to face a lat/lng (camera on SAME side — looking at pin)
function camAnglesFor(lat, lng) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = (lng + 180) * Math.PI / 180;
    const px = -(Math.sin(phi) * Math.cos(theta));
    const py =  Math.cos(phi);
    const pz =  Math.sin(phi) * Math.sin(theta);
    // Camera at +P direction (same side as pin, looking toward origin → sees pin on near surface)
    const polar = Math.acos(Math.max(-1, Math.min(1, py)));
    const sp = Math.sin(polar);
    const azimuth = Math.abs(sp) < 1e-10 ? 0 : Math.atan2(px/sp, pz/sp);
    return { polar, azimuth };
}

// ═══════════════════════════════════════════
//  PIN CREATION
// ═══════════════════════════════════════════
function clearPins() {
    while (pinGroup.children.length) pinGroup.remove(pinGroup.children[0]);
}

function createPin(lat, lng) {
    const pos = latLngToVec3(lat, lng, 1.02);

    // Red dot
    const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.004, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xff3344 })
    );
    dot.position.copy(pos);
    pinGroup.add(dot);

    // Pulsing ring
    const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.012, 0.02, 32),
        new THREE.MeshBasicMaterial({ color: 0xff3344, transparent: true, opacity: 0.7, side: THREE.DoubleSide })
    );
    ring.position.copy(pos);
    ring.lookAt(0, 0, 0);
    pinGroup.add(ring);

    (function pulse() {
        new TWEEN.Tween(ring.scale).to({x:2, y:2, z:2}, 700)
            .easing(TWEEN.Easing.Cubic.Out)
            .chain(new TWEEN.Tween(ring.scale).to({x:1, y:1, z:1}, 700)
                .easing(TWEEN.Easing.Cubic.In).onComplete(pulse))
            .start();
    })();

    log('Pin created at lat=' + lat + ' lng=' + lng);
}

// ═══════════════════════════════════════════
//  ANIMATION — single smooth motion
//  Camera spins anti-clockwise WHILE zooming toward city.
//  Azimuth overshoots target by ~60° (anti-clockwise feel)
//  then lands exactly on city. One TWEEN, one motion.
//  Pin drops at the end.
// ═══════════════════════════════════════════

function go() {
    const lat = parseFloat(document.getElementById('lat').value);
    const lng = parseFloat(document.getElementById('lng').value);
    if (isNaN(lat) || isNaN(lng)) return;

    // Reset everything
    TWEEN.removeAll();
    clearPins();
    earth.rotation.set(0, 0, 0);
    camera.position.set(0, 0, 3.5);
    camera.lookAt(0, 0, 0);

    const target = camAnglesFor(lat, lng);
    const startDist = 3.5;
    const endDist = 1.5;

    // Start azimuth: offset anti-clockwise from target by ~60°
    // This makes the camera sweep anti-clockwise and land on the city
    const startAzimuth = target.azimuth + Math.PI / 3;

    log('Flying to lat=' + lat + ' lng=' + lng);

    const s = { dist: startDist, polar: Math.PI / 2, azimuth: startAzimuth };

    // Set initial camera position
    setCam(s.dist, s.polar, s.azimuth);

    // Single TWEEN: spin anti-clockwise + tilt to latitude + zoom in
    new TWEEN.Tween(s)
        .to({ dist: endDist, polar: target.polar, azimuth: target.azimuth }, 8000)
        .easing(TWEEN.Easing.Cubic.InOut)
        .onUpdate(() => setCam(s.dist, s.polar, s.azimuth))
        .onComplete(() => {
            createPin(lat, lng);
            log('Pin at lat=' + lat + ' lng=' + lng);
        })
        .start();
}

function log(msg) {
    document.getElementById('info').textContent = msg;
    console.log(msg);
}

// ═══════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════
function loop() {
    requestAnimationFrame(loop);
    TWEEN.update();
    renderer.render(scene, camera);
}
loop();

// Auto-fly on load
setTimeout(go, 500);
</script>
</body></htm
