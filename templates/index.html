<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CCTV Casino Game — Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right)
                     env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .stream-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #video-feed, #livekit-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        #livekit-video { display: none; }

        /* Tiny glowing dot — top left corner */
        .status-dot {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 10;
            animation: glow 2s infinite;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 6px #00ff88, 0 0 12px #00ff8844;
        }

        .status-dot.mjpeg {
            background: #ffcc00;
            box-shadow: 0 0 6px #ffcc00, 0 0 12px #ffcc0044;
        }

        .status-dot.disconnected {
            background: #ff4444;
            box-shadow: none;
            animation: none;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Mobile: slightly smaller dot */
        @media (max-width: 768px) {
            .status-dot {
                width: 6px;
                height: 6px;
                top: 6px;
                left: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="stream-container">
        <div class="status-dot disconnected" id="status-dot"></div>

        <!-- MJPEG fallback (works always) -->
        <img id="video-feed" src="/video_feed" alt="Live">

        <!-- LiveKit WebRTC video (hidden until connected) -->
        <video id="livekit-video" autoplay playsinline muted></video>
    </div>

    <!-- LiveKit JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>

    <script>
        const dot = document.getElementById('status-dot');
        const mjpeg = document.getElementById('video-feed');
        const lkVideo = document.getElementById('livekit-video');

        async function connectLiveKit() {
            try {
                const resp = await fetch('/api/livekit/token?identity=viewer-' + Date.now());
                const data = await resp.json();

                if (data.error) {
                    showMJPEG();
                    return;
                }

                const room = new LivekitClient.Room();

                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                    if (track.kind === LivekitClient.Track.Kind.Video) {
                        track.attach(lkVideo);
                        showLiveKit();
                    }
                });

                room.on(LivekitClient.RoomEvent.Disconnected, () => {
                    showMJPEG();
                    setTimeout(connectLiveKit, 5000);
                });

                await room.connect(data.url, data.token);

            } catch (err) {
                showMJPEG();
                setTimeout(connectLiveKit, 10000);
            }
        }

        function showLiveKit() {
            mjpeg.style.display = 'none';
            lkVideo.style.display = 'block';
            dot.className = 'status-dot connected';
        }

        function showMJPEG() {
            mjpeg.style.display = 'block';
            lkVideo.style.display = 'none';
            dot.className = 'status-dot mjpeg';
        }

        showMJPEG();
        connectLiveKit();
    </script>
</body>
</html>
