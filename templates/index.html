<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CCTV Rush Hour</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }

        /* Both layers always in DOM — switch with z-index (no display toggle) */
        #globe-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; /* on top during BETTING */
        }
        #stream-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; /* behind globe during BETTING */
        }
        #livekit-video {
            width: 100%; height: 100%;
            object-fit: contain; display: block;
        }
        #globe-canvas { width: 100%; height: 100%; display: block; }

        /* Stream name — top center */
        #stream-name-overlay {
            position: absolute; top: 18px; left: 50%;
            transform: translateX(-50%);
            z-index: 30; display: none;
            color: #fff; font-size: 18px; font-weight: 700;
            font-family: 'Segoe UI', sans-serif;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* Thumbnail overlay — positioned dynamically below pin */
        #thumbnail-overlay {
            position: absolute;
            transform: translateX(-50%);  /* center horizontally on pin */
            text-align: center; z-index: 25; display: none;
            pointer-events: none;
        }

        /* Red blinking connector line from pin to thumbnail */
        #pin-connector {
            width: 1.5px; margin: 0 auto;
            background: #ff3344;
            animation: pinLineBlink 0.8s ease-in-out infinite;
        }
        @keyframes pinLineBlink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #thumbnail-overlay img, #thumbnail-overlay video {
            max-width: 180px; max-height: 110px;
            border-radius: 8px; border: 1.5px solid rgba(255,80,80,0.5);
            display: block; margin-left: auto; margin-right: auto;
        }

        /* Status dot */
        .status-dot {
            position: absolute; top: 10px; left: 10px;
            width: 8px; height: 8px; border-radius: 50%;
            z-index: 50; animation: glow 2s infinite;
        }
        .status-dot.connected { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
        .status-dot.betting { background: #ffd700; box-shadow: 0 0 6px #ffd700; }
        .status-dot.disconnected { background: #ff4444; box-shadow: none; animation: none; }
        @keyframes glow { 0%,100%{opacity:0.5} 50%{opacity:1} }

        /* Timer */
        #timer-overlay {
            position: absolute; top: 12px; right: 12px;
            width: 44px; height: 44px; z-index: 50;
        }
    </style>
</head>
<body>
    <!-- Globe (BETTING phase) -->
    <div id="globe-container"><canvas id="globe-canvas"></canvas></div>

    <!-- LiveKit stream (COUNTING + WAITING) — ALWAYS in DOM, never removed -->
    <div id="stream-container"><video id="livekit-video" autoplay playsinline muted></video></div>

    <!-- Stream name — top center during BETTING -->
    <div id="stream-name-overlay"></div>

    <!-- Thumbnail overlay — positioned below pin, connected by red line -->
    <div id="thumbnail-overlay">
        <div id="pin-connector"></div>
        <img id="thumb-img" src="" alt="" style="display:none">
    </div>

    <!-- Timer -->
    <canvas id="timer-overlay" width="44" height="44"></canvas>

    <!-- Status dot -->
    <div class="status-dot disconnected" id="status-dot"></div>

    <!-- Three.js + TWEEN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18/dist/tween.umd.js"></script>
    <!-- LiveKit -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>

    <script>
    // ══════════════════════════════════════════
    //  CONFIG — adjustable timings
    // ══════════════════════════════════════════
    const PIN_DROP_SEC = 9;            // When pin drops on globe
    const THUMBNAIL_REVEAL_SEC = 11;   // When to show thumbnail
    const BETTING_DURATION = 15;       // Total betting phase duration

    // ══════════════════════════════════════════
    //  ELEMENTS
    // ══════════════════════════════════════════
    const globeContainer = document.getElementById('globe-container');
    const streamContainer = document.getElementById('stream-container');
    const lkVideo = document.getElementById('livekit-video');
    const thumbOverlay = document.getElementById('thumbnail-overlay');
    const thumbImg = document.getElementById('thumb-img');
    const pinConnector = document.getElementById('pin-connector');
    const streamNameOverlay = document.getElementById('stream-name-overlay');
    const timerCanvas = document.getElementById('timer-overlay');
    const timerCtx = timerCanvas.getContext('2d');
    const dot = document.getElementById('status-dot');

    // Store current pin lat/lng for screen projection
    let currentPinLat = 0, currentPinLng = 0;

    let currentPhase = 'IDLE';
    let liveKitConnected = false;
    let initialStateSynced = false;  // true after first data handles reload catch-up

    // ══════════════════════════════════════════
    //  THREE.JS GLOBE
    // ══════════════════════════════════════════
    let scene, camera, renderer, earth, pinGroup;
    let globeRunning = false;
    let idleRotationTween = null;  // continuous anti-clockwise spin
    let bettingTimeouts = [];      // track scheduled timeouts for cleanup

    function initGlobe() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.5);

        const canvas = document.getElementById('globe-canvas');
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setClearColor(0x000000, 1);  // solid black background (no bleed-through)
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Stars
        const sv = [];
        for (let i = 0; i < 3000; i++) sv.push((Math.random()-0.5)*100,(Math.random()-0.5)*100,(Math.random()-0.5)*100);
        const sg = new THREE.BufferGeometry();
        sg.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
        scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 })));

        // Earth with NASA night texture
        const tex = new THREE.TextureLoader().load('/static/earth_night.jpg');
        earth = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.MeshBasicMaterial({ map: tex })
        );
        scene.add(earth);

        // Atmosphere
        scene.add(new THREE.Mesh(
            new THREE.SphereGeometry(1.02, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.08, side: THREE.BackSide })
        ));

        // Pin group is CHILD OF EARTH — pins rotate with the globe
        pinGroup = new THREE.Group();
        earth.add(pinGroup);

        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function startGlobeLoop() {
        if (globeRunning) return;
        globeRunning = true;
        function loop() {
            if (!globeRunning) return;  // STOPS when not needed
            requestAnimationFrame(loop);
            TWEEN.update();
            renderer.render(scene, camera);
        }
        loop();
    }

    function stopGlobeLoop() {
        globeRunning = false;
    }

    // ── Lat/Lng to 3D position on sphere ──
    // Matches Three.js SphereGeometry UV mapping for equirectangular textures.
    // The +180 offset aligns with texture left edge = antimeridian (-180°).
    function latLngToVector3(lat, lng, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -(radius * Math.sin(phi) * Math.cos(theta)),
              radius * Math.cos(phi),
              radius * Math.sin(phi) * Math.sin(theta)
        );
    }

    // ── Camera spherical positioning ──
    // Convert spherical (distance, polarAngle, azimuthAngle) to camera XYZ.
    // polarAngle: 0=north pole, PI/2=equator, PI=south pole
    // azimuthAngle: horizontal orbit (radians)
    function setCameraSpherical(dist, polar, azimuth) {
        camera.position.set(
            dist * Math.sin(polar) * Math.sin(azimuth),
            dist * Math.cos(polar),
            dist * Math.sin(polar) * Math.cos(azimuth)
        );
        camera.lookAt(0, 0, 0);
    }

    // ── Compute camera spherical angles to look directly at a lat/lng point ──
    // Camera must be on the OPPOSITE side of the globe from the target point.
    // Derived from: camera_pos = -point_pos * distance (so camera looks toward origin → sees point)
    function targetAnglesForLatLng(lat, lng) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        // Point on unit sphere (same as latLngToVector3)
        const px = -(Math.sin(phi) * Math.cos(theta));
        const py =  Math.cos(phi);
        const pz =  Math.sin(phi) * Math.sin(theta);
        // Camera at -P (opposite side)
        const cx = -px, cy = -py, cz = -pz;
        // Convert to spherical: cy = cos(polar), cx = sin(polar)*sin(az), cz = sin(polar)*cos(az)
        const polar = Math.acos(Math.max(-1, Math.min(1, cy)));
        const sinPolar = Math.sin(polar);
        const azimuth = (Math.abs(sinPolar) < 1e-10) ? 0 : Math.atan2(cx / sinPolar, cz / sinPolar);
        return { polar, azimuth };
    }

    // ── Create pin + pulsing ring at lat/lng (in earth-local space) ──
    function createPin(lat, lng) {
        const pos = latLngToVector3(lat, lng, 1.01);
        const pin = new THREE.Mesh(
            new THREE.SphereGeometry(0.025, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xff3344 })
        );
        pin.position.copy(pos);
        pinGroup.add(pin);

        const ring = new THREE.Mesh(
            new THREE.RingGeometry(0.04, 0.06, 32),
            new THREE.MeshBasicMaterial({ color: 0xff3344, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
        );
        ring.position.copy(pos);
        ring.lookAt(new THREE.Vector3(0, 0, 0));  // face outward from earth center
        pinGroup.add(ring);

        // Pulsing animation
        (function pulse() {
            new TWEEN.Tween(ring.scale).to({ x: 1.8, y: 1.8, z: 1.8 }, 700)
                .easing(TWEEN.Easing.Cubic.Out)
                .chain(new TWEEN.Tween(ring.scale).to({ x: 1, y: 1, z: 1 }, 700)
                    .easing(TWEEN.Easing.Cubic.In).onComplete(pulse))
                .start();
        })();
    }

    // ══════════════════════════════════════════
    //  ANIMATION: flyToCity (normal round start)
    //
    //  Timeline (15 sec BETTING):
    //    0-3s:  Anti-clockwise idle spin (earth rotates, camera far)
    //    3-8s:  Camera orbits to city + zooms in close
    //    9s:    Pin drops on exact lat/lng
    //    11s:   Thumbnail video/image appears
    //    15s:   BETTING ends → stream shows
    //
    //  Approach: Earth stays FIXED (rotation.y = 0). Camera ORBITS around it.
    //  Pin is child of earth → always at correct lat/lng regardless of view.
    // ══════════════════════════════════════════

    function flyToCity(lat, lng, cityName, thumbnail) {
        // Clear previous
        clearBettingTimeouts();
        while (pinGroup.children.length) pinGroup.remove(pinGroup.children[0]);
        thumbOverlay.style.display = 'none';
        hideStreamName();
        TWEEN.removeAll();

        // Store for screen projection later
        currentPinLat = lat;
        currentPinLng = lng;

        // Earth stays at rotation 0 — camera moves instead
        earth.rotation.set(0, 0, 0);

        // Target camera angles to face the city
        const target = targetAnglesForLatLng(lat, lng);
        const startDist = 3.5;
        const endDist = 1.8;    // close zoom

        // Animation state object (TWEEN interpolates this)
        const camState = { dist: startDist, polar: Math.PI / 2, azimuth: 0 };

        // Phase 1 (0-3s): Anti-clockwise idle spin
        new TWEEN.Tween(camState)
            .to({ azimuth: -Math.PI / 3 }, 3000)
            .easing(TWEEN.Easing.Linear.None)
            .onUpdate(() => setCameraSpherical(camState.dist, camState.polar, camState.azimuth))
            .start();

        // Phase 2 (3-8s): Orbit to city + zoom in
        new TWEEN.Tween(camState)
            .to({ dist: endDist, polar: target.polar, azimuth: target.azimuth }, 5000)
            .delay(3000)
            .easing(TWEEN.Easing.Cubic.InOut)
            .onUpdate(() => setCameraSpherical(camState.dist, camState.polar, camState.azimuth))
            .start();

        // Phase 3 (9s): Pin drop + show stream name
        const t1 = setTimeout(() => {
            createPin(lat, lng);
            showStreamName(cityName);
        }, PIN_DROP_SEC * 1000);
        bettingTimeouts.push(t1);

        // Phase 4 (11s): Thumbnail below pin
        const t2 = setTimeout(() => showThumbnail(cityName, thumbnail), THUMBNAIL_REVEAL_SEC * 1000);
        bettingTimeouts.push(t2);
    }

    // ── Instant snap for reload catch-up ──
    function snapToCity(lat, lng, cityName, thumbnail, phaseElapsed) {
        clearBettingTimeouts();
        while (pinGroup.children.length) pinGroup.remove(pinGroup.children[0]);
        thumbOverlay.style.display = 'none';
        hideStreamName();
        TWEEN.removeAll();

        currentPinLat = lat;
        currentPinLng = lng;
        earth.rotation.set(0, 0, 0);

        // Snap camera to final position (facing city, zoomed in)
        const target = targetAnglesForLatLng(lat, lng);
        setCameraSpherical(1.8, target.polar, target.azimuth);

        // Pin + stream name: show if past PIN_DROP_SEC, else schedule
        if (phaseElapsed >= PIN_DROP_SEC) {
            createPin(lat, lng);
            showStreamName(cityName);
        } else {
            const t = setTimeout(() => {
                createPin(lat, lng);
                showStreamName(cityName);
            }, (PIN_DROP_SEC - phaseElapsed) * 1000);
            bettingTimeouts.push(t);
        }

        // Thumbnail: show if past THUMBNAIL_REVEAL_SEC, else schedule
        if (phaseElapsed >= THUMBNAIL_REVEAL_SEC) {
            showThumbnail(cityName, thumbnail);
        } else {
            const t = setTimeout(() => showThumbnail(cityName, thumbnail),
                (THUMBNAIL_REVEAL_SEC - phaseElapsed) * 1000);
            bettingTimeouts.push(t);
        }
    }

    function clearBettingTimeouts() {
        bettingTimeouts.forEach(t => clearTimeout(t));
        bettingTimeouts = [];
    }

    // ── Project a lat/lng pin position to screen (x, y) pixels ──
    function projectPinToScreen(lat, lng) {
        const pos = latLngToVector3(lat, lng, 1.01);
        // Pin is in earth-local space; earth.rotation is (0,0,0) so world = local
        const worldPos = pos.clone();
        earth.localToWorld(worldPos);
        const projected = worldPos.clone().project(camera);
        return {
            x: (projected.x * 0.5 + 0.5) * window.innerWidth,
            y: (-projected.y * 0.5 + 0.5) * window.innerHeight
        };
    }

    // ── Show stream name at top center ──
    function showStreamName(name) {
        streamNameOverlay.textContent = name || '';
        streamNameOverlay.style.display = 'block';
    }

    function hideStreamName() {
        streamNameOverlay.style.display = 'none';
    }

    // ── Show thumbnail below pin, connected by red blinking line ──
    function showThumbnail(cityName, thumbnail) {
        // Hide previous media
        thumbImg.style.display = 'none';
        let vid = document.getElementById('thumb-video');
        if (vid) { vid.pause(); vid.style.display = 'none'; }

        // Project pin to screen coords
        const pin = projectPinToScreen(currentPinLat, currentPinLng);

        // Connector line height (distance from pin to thumbnail)
        const lineHeight = 40;
        pinConnector.style.height = lineHeight + 'px';

        // Position overlay: centered horizontally on pin, starts just below pin
        thumbOverlay.style.left = pin.x + 'px';
        thumbOverlay.style.top = (pin.y + 8) + 'px';  // 8px below pin dot

        // Load media
        if (thumbnail) {
            const ext = thumbnail.split('.').pop().toLowerCase();
            const isVideo = ['mp4', 'webm', 'mov'].includes(ext);

            if (isVideo) {
                if (!vid) {
                    vid = document.createElement('video');
                    vid.id = 'thumb-video';
                    vid.autoplay = true; vid.muted = true; vid.playsInline = true;
                    vid.loop = true;
                    vid.style.cssText = 'max-width:180px;max-height:110px;border-radius:8px;border:1.5px solid rgba(255,80,80,0.5);display:block;margin:0 auto;';
                    thumbOverlay.appendChild(vid);
                }
                vid.src = '/thumbnails/' + thumbnail;
                vid.style.display = 'block';
                vid.play().catch(() => {});
            } else {
                thumbImg.src = '/thumbnails/' + thumbnail;
                thumbImg.style.display = 'block';
            }
        }

        // Show stream name at top center
        showStreamName(cityName);

        thumbOverlay.style.display = 'block';
    }

    function resetGlobe() {
        clearBettingTimeouts();
        thumbOverlay.style.display = 'none';
        hideStreamName();
        const vid = document.getElementById('thumb-video');
        if (vid) { vid.pause(); vid.style.display = 'none'; }
        while (pinGroup.children.length) pinGroup.remove(pinGroup.children[0]);
        earth.rotation.set(0, 0, 0);
        camera.position.set(0, 0, 3.5);
        camera.lookAt(0, 0, 0);
        TWEEN.removeAll();
    }

    // ══════════════════════════════════════════
    //  TIMER CIRCLE
    // ══════════════════════════════════════════
    function drawTimer(remaining, total, color) {
        const w = 44, h = 44, cx = 22, cy = 22, r = 18;
        timerCtx.clearRect(0, 0, w, h);
        timerCtx.beginPath(); timerCtx.arc(cx, cy, r, 0, Math.PI*2);
        timerCtx.fillStyle = 'rgba(30,30,30,0.8)'; timerCtx.fill();
        const ratio = total > 0 ? remaining / total : 0;
        if (ratio > 0) {
            timerCtx.beginPath();
            timerCtx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*ratio);
            timerCtx.strokeStyle = color; timerCtx.lineWidth = 3; timerCtx.stroke();
        }
        timerCtx.fillStyle = '#fff'; timerCtx.font = 'bold 14px Segoe UI';
        timerCtx.textAlign = 'center'; timerCtx.textBaseline = 'middle';
        timerCtx.fillText(Math.ceil(remaining), cx, cy);
    }

    // ══════════════════════════════════════════
    //  FIX #1: PHASE SWITCHING — z-index, no display toggle
    //  LiveKit video ALWAYS plays, never detached from DOM
    // ══════════════════════════════════════════
    function showGlobePhase() {
        globeContainer.style.zIndex = '10';       // globe on top
        globeContainer.style.visibility = 'visible';
        streamContainer.style.zIndex = '5';        // stream behind (STILL PLAYING)
        startGlobeLoop();                           // start rendering
        dot.className = 'status-dot betting';
    }

    function showStreamPhase() {
        globeContainer.style.zIndex = '1';         // globe behind
        globeContainer.style.visibility = 'hidden'; // HIDE completely — no stars bleed
        streamContainer.style.zIndex = '10';        // stream on top
        stopGlobeLoop();                             // FREE GPU for LiveKit
        clearBettingTimeouts();
        thumbOverlay.style.display = 'none';
        hideStreamName();
        dot.className = liveKitConnected ? 'status-dot connected' : 'status-dot disconnected';
    }

    // ══════════════════════════════════════════
    //  FIX #1: WebSocket for phase changes + timer
    //  HTTP polling ONLY as fallback (every 2s, not 500ms)
    // ══════════════════════════════════════════
    let lastRoundId = '';
    let bettingAnimStarted = false;
    let wsConnected = false;

    function handleGameData(data) {
        const phase = data.phase;
        const phaseElapsed = data.phase_elapsed || 0;

        // ── Timer (always update, safe on every message) ──
        if (phase === 'BETTING') {
            drawTimer(data.betting_timer || 0, BETTING_DURATION, '#ffd700');
        } else if (phase === 'COUNTING') {
            const ct = (data.round_timer || 0) - 6;
            drawTimer(Math.max(0, ct), 35, '#00ff64');
        } else if (phase === 'WAITING') {
            drawTimer(data.waiting_timer || 0, 6, '#ff4466');
        } else {
            drawTimer(0, 1, '#666');
        }

        // ── Reload catch-up: first data after page load ──
        // currentPhase is 'IDLE' only on fresh load / reload.
        // We need to jump straight to whatever phase the server is in.
        if (!initialStateSynced) {
            initialStateSynced = true;

            if (phase === 'COUNTING' || phase === 'WAITING') {
                // Server is mid-stream — show stream immediately, hide globe
                currentPhase = phase;
                lastRoundId = data.round_id || '';
                bettingAnimStarted = true;   // don't trigger globe anim later
                showStreamPhase();
                return;
            }

            if (phase === 'BETTING') {
                // Server is mid-betting — show globe, snap to city instantly
                currentPhase = 'BETTING';
                lastRoundId = data.round_id || '';
                bettingAnimStarted = true;
                showGlobePhase();
                resetGlobe();

                const lat = data.city_lat || 0;
                const lng = data.city_lng || 0;
                const name = data.city_name || data.stream_name || '';
                const thumb = data.thumbnail || '';
                if (lat !== 0 || lng !== 0) {
                    snapToCity(lat, lng, name, thumb, phaseElapsed);
                }
                return;
            }

            // phase === 'IDLE' — nothing to catch up, fall through
        }

        // ── Normal phase transition: BETTING starts ──
        if (phase === 'BETTING' && currentPhase !== 'BETTING') {
            currentPhase = 'BETTING';
            showGlobePhase();
            bettingAnimStarted = false;
        }

        // ── Start globe animation (once per round, normal flow) ──
        if (phase === 'BETTING' && !bettingAnimStarted) {
            const rid = data.round_id;
            if (rid !== lastRoundId) {
                lastRoundId = rid;
                bettingAnimStarted = true;
                resetGlobe();
                const lat = data.city_lat || 0;
                const lng = data.city_lng || 0;
                const name = data.city_name || data.stream_name || '';
                const thumb = data.thumbnail || '';
                if (lat !== 0 || lng !== 0) flyToCity(lat, lng, name, thumb);
            }
        }

        // ── Phase transition: BETTING → COUNTING/WAITING (show stream) ──
        if ((phase === 'COUNTING' || phase === 'WAITING') && currentPhase === 'BETTING') {
            currentPhase = phase;
            showStreamPhase();
        }

        // ── Track sub-transitions (COUNTING → WAITING) ──
        if (phase === 'COUNTING') currentPhase = 'COUNTING';
        if (phase === 'WAITING') currentPhase = 'WAITING';
    }

    // WebSocket — PRIMARY data source (no polling needed)
    function connectWebSocket() {
        const ws = new WebSocket('ws://' + location.host + '/ws/game');

        ws.onopen = () => { wsConnected = true; };

        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'initial_state' || msg.type === 'game_state') {
                    handleGameData(msg.data);
                }
                if (msg.type === 'timer_update') {
                    handleGameData(msg.data);
                }
            } catch (err) {}
        };

        ws.onclose = () => {
            wsConnected = false;
            setTimeout(connectWebSocket, 3000);
        };

        ws.onerror = () => ws.close();
    }

    // HTTP polling — FALLBACK only (every 2s, not 500ms)
    async function pollFallback() {
        if (wsConnected) return; // skip if WebSocket working
        try {
            const resp = await fetch('/api/round');
            const data = await resp.json();
            handleGameData(data);
        } catch (e) {}
    }

    // ══════════════════════════════════════════
    //  LIVEKIT — connects once, stays forever
    // ══════════════════════════════════════════
    async function connectLiveKit() {
        try {
            const resp = await fetch('/api/livekit/token?identity=viewer-' + Date.now());
            const data = await resp.json();
            if (data.error) { setTimeout(connectLiveKit, 10000); return; }

            const room = new LivekitClient.Room();
            room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                if (track.kind === LivekitClient.Track.Kind.Video) {
                    track.attach(lkVideo);
                    liveKitConnected = true;
                    if (currentPhase !== 'BETTING') dot.className = 'status-dot connected';
                }
            });
            room.on(LivekitClient.RoomEvent.Disconnected, () => {
                liveKitConnected = false;
                setTimeout(connectLiveKit, 5000);
            });
            await room.connect(data.url, data.token);
        } catch (err) {
            setTimeout(connectLiveKit, 10000);
        }
    }

    // ══════════════════════════════════════════
    //  STARTUP
    // ══════════════════════════════════════════
    initGlobe();
    startGlobeLoop(); // render globe initially
    connectLiveKit();
    connectWebSocket();
    setInterval(pollFallback, 2000); // slow fallback only
    pollFallback();
    </script>
</body>
</html>
