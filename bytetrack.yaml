tracker_type: bytetrack
track_high_thresh: 0.20    # Lower = more detections enter primary matching (reduces flicker)
track_low_thresh: 0.05     # Very low = rescue even weakest detections for existing tracks
new_track_thresh: 0.15     # Min conf to create NEW track
track_buffer: 180          # 6 sec at 30fps — survives pole/pillar occlusion
match_thresh: 0.60         # Lower = easier to re-associate lost tracks (less ID switches)
fuse_score: true
